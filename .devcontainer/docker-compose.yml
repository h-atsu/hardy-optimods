services:
  vscode:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: /bin/bash -lc "cd /workspace && uv sync && sleep infinity"
    environment:
      UV_PROJECT_ENVIRONMENT: /workspace/.venv
    ports:
      - "8000:8000"
      - "8001:8001"
      - "5555:5555"
    user: vscode
    volumes:
      - ..:/workspace:cached
    env_file:
      - path: ../.env
        
  redis:
    image: redis:latest
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:18
    env_file:
      - path: ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  redis-data:
  postgres-data:
